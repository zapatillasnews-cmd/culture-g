<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Culture G</title>
  <meta name="description" content="Entraîne ta culture générale avec des cartes à swiper">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Culture G">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ── AUTH ──────────────────────────────────────────────────────────── -->
  <div id="screen-auth" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-text">Culture <em>G</em></div>
        <p class="logo-sub">Entraîne ta culture générale</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <form id="auth-form" class="auth-form" novalidate>
        <div class="input-group">
          <label for="auth-email">E-mail</label>
          <input type="email" id="auth-email" placeholder="ton@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="auth-password">Mot de passe</label>
          <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="auth-error" class="auth-error" role="alert"></div>
        <button type="submit" id="auth-submit" class="btn-primary">Se connecter</button>
      </form>

      <button id="btn-skip-auth" class="btn-ghost">Continuer sans compte →</button>
    </div>
  </div>

  <!-- ── HOME ──────────────────────────────────────────────────────────── -->
  <div id="screen-home" class="screen">
    <header class="home-header">
      <span class="logo-small">Culture <em>G</em></span>
      <div class="header-right">
        <div id="user-stats" class="user-stats">
          <span id="total-score">0</span> pts
        </div>
        <button id="btn-logout" class="btn-icon" title="Déconnexion" aria-label="Déconnexion">⎋</button>
      </div>
    </header>

    <div class="home-content">
      <h1 class="home-title">Choisis une<br>catégorie</h1>
      <div class="categories-grid" id="categories-grid"></div>
    </div>

    <footer class="home-footer">
      <div id="daily-progress" class="daily-progress">
        <div class="progress-text">Aujourd'hui : <span id="daily-count">0</span> cartes vues</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
    </footer>
  </div>

  <!-- ── CARDS ──────────────────────────────────────────────────────────── -->
  <div id="screen-cards" class="screen">
    <header class="cards-header">
      <button id="btn-back" class="btn-icon-white" aria-label="Retour">←</button>
      <div class="cards-progress">
        <span id="card-current">1</span> / <span id="card-total">8</span>
      </div>
      <div id="session-score" class="session-score">0 ✓</div>
    </header>

    <div class="cards-arena">
      <div class="swipe-hint" id="hint-left">✗ Pas su</div>
      <div class="swipe-hint" id="hint-right">✓ Je savais</div>
      <div id="card-stack" class="card-stack"></div>
    </div>

    <div class="tap-hint" id="tap-hint">Appuie pour révéler la réponse</div>

    <div class="card-actions" id="card-actions">
      <button class="btn-action btn-wrong" id="btn-wrong">
        <span class="action-icon">✗</span>
        <span>Je ne savais pas</span>
      </button>
      <button class="btn-action btn-correct" id="btn-correct">
        <span class="action-icon">✓</span>
        <span>Je savais !</span>
      </button>
    </div>
  </div>

  <!-- ── VINYL ─────────────────────────────────────────────────────────────── -->
  <div id="screen-vinyl" class="screen">
    <header class="vinyl-header">
      <button id="btn-back-vinyl" class="btn-icon-white" aria-label="Retour">←</button>
      <div class="vinyl-progress">
        <span id="vinyl-current">1</span> / <span id="vinyl-total">10</span>
      </div>
      <div id="vinyl-score" class="session-score">0 ✓</div>
    </header>

    <div class="vinyl-arena">
      <div class="vinyl-stage" id="vinyl-stage">
        <!-- Vinyl tournant -->
        <div class="vinyl-wrap" id="vinyl-wrap">
          <svg class="vinyl-disc" id="vinyl-disc" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Lumière forte top-right (comme dans la photo) -->
              <radialGradient id="vg-gloss" cx="74%" cy="20%" r="58%">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.50)"/>
                <stop offset="28%"  stop-color="rgba(255,255,255,0.20)"/>
                <stop offset="65%"  stop-color="rgba(255,255,255,0.04)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
              </radialGradient>
              <!-- Ombre bas-gauche -->
              <radialGradient id="vg-shadow" cx="20%" cy="80%" r="55%">
                <stop offset="0%"   stop-color="rgba(0,0,0,0.45)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
              </radialGradient>
              <!-- Label blanc -->
              <radialGradient id="vg-label" cx="38%" cy="32%" r="65%">
                <stop offset="0%"   stop-color="#FFFFFF"/>
                <stop offset="100%" stop-color="#EBEBEB"/>
              </radialGradient>
              <!-- Vignette bord -->
              <radialGradient id="vg-edge" cx="50%" cy="50%" r="50%">
                <stop offset="72%"  stop-color="rgba(0,0,0,0)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0.60)"/>
              </radialGradient>
              <!-- Broche chromée -->
              <linearGradient id="vg-spindle" x1="15%" y1="10%" x2="85%" y2="90%">
                <stop offset="0%"   stop-color="#F5F5F5"/>
                <stop offset="22%"  stop-color="#D0D0D0"/>
                <stop offset="50%"  stop-color="#7A7A7A"/>
                <stop offset="78%"  stop-color="#B8B8B8"/>
                <stop offset="100%" stop-color="#3A3A3A"/>
              </linearGradient>
            </defs>

            <!-- Disque principal -->
            <circle cx="150" cy="150" r="149" fill="var(--vinyl-color,#C41E1E)"/>

            <!-- Sillons — peu nombreux, espacés, subtils -->
            <circle cx="150" cy="150" r="145" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="2.5"/>
            <circle cx="150" cy="150" r="136" fill="none" stroke="rgba(0,0,0,0.16)" stroke-width="1.5"/>
            <circle cx="150" cy="150" r="126" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <circle cx="150" cy="150" r="116" fill="none" stroke="rgba(0,0,0,0.14)" stroke-width="1.5"/>
            <circle cx="150" cy="150" r="106" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>
            <circle cx="150" cy="150" r="96"  fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <circle cx="150" cy="150" r="88"  fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

            <!-- Ombre bas-gauche -->
            <circle cx="150" cy="150" r="149" fill="url(#vg-shadow)"/>
            <!-- Lumière top-right intense -->
            <circle cx="150" cy="150" r="149" fill="url(#vg-gloss)"/>
            <!-- Vignette bord -->
            <circle cx="150" cy="150" r="149" fill="url(#vg-edge)"/>

            <!-- Étiquette centrale blanche (grande) -->
            <circle cx="150" cy="150" r="82" fill="url(#vg-label)"/>
            <circle cx="150" cy="150" r="82" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="0.5"/>

            <!-- Broche chromée -->
            <circle cx="150" cy="150" r="14" fill="url(#vg-spindle)"/>
            <ellipse cx="145" cy="145" rx="4.5" ry="2.5" fill="rgba(255,255,255,0.72)" transform="rotate(-35,145,145)"/>
            <circle cx="150" cy="150" r="4.5" fill="#181818"/>
            <circle cx="148.5" cy="148.5" r="1.5" fill="rgba(255,255,255,0.45)"/>
          </svg>
          <!-- Label overlay statique (ne tourne pas) -->
          <div class="vinyl-label-overlay">
            <span class="vlabel-artist" id="vlabel-artist"></span>
            <span class="vlabel-song" id="vlabel-song"></span>
            <span class="vlabel-year" id="vlabel-year"></span>
          </div>
          <!-- Overlay tap-to-play (si autoplay bloqué) -->
          <div class="vinyl-tap-overlay" id="vinyl-tap-overlay" hidden>
            <span class="vinyl-tap-icon">▶</span>
          </div>
        </div>

        <!-- Bras de lecture (tourne-disque) -->
        <svg class="tonearm-svg" id="tonearm" viewBox="0 0 100 185" xmlns="http://www.w3.org/2000/svg">
          <!-- Pivot (bearing chromé) -->
          <circle cx="82" cy="16" r="11" fill="#111" stroke="#2A2A2A" stroke-width="1"/>
          <circle cx="82" cy="16" r="6.5" fill="#1E1E1E"/>
          <ellipse cx="78.5" cy="12.5" rx="3" ry="1.8" fill="rgba(255,255,255,0.22)" transform="rotate(-25,78.5,12.5)"/>
          <!-- Bras noir mat -->
          <path d="M82,16 Q71,80 48,160" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
          <path d="M82,16 Q71,80 48,160" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Contre-poids (anti-skating) -->
          <circle cx="84" cy="10" r="5" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="0.5"/>
          <!-- Headshell (pince) -->
          <rect x="35" y="153" width="27" height="16" rx="3.5" fill="#111"/>
          <rect x="36" y="154" width="25" height="6" rx="2" fill="#1E1E1E"/>
          <circle cx="39" cy="163" r="1.8" fill="#2A2A2A"/>
          <circle cx="59" cy="163" r="1.8" fill="#2A2A2A"/>
          <!-- Aiguille -->
          <line x1="48" y1="169" x2="48" y2="177" stroke="#0D0D0D" stroke-width="3.5" stroke-linecap="round"/>
          <ellipse cx="48" cy="179" rx="3.5" ry="2.2" fill="#080808"/>
          <ellipse cx="47" cy="178" rx="1.2" ry="0.8" fill="rgba(255,255,255,0.25)"/>
        </svg>
      </div>

      <!-- Infos chanson -->
      <div class="vinyl-info">
        <h2 class="vinyl-song-name" id="vinyl-song-name"></h2>
        <p class="vinyl-artist-line" id="vinyl-artist-line"></p>
      </div>

      <!-- Anecdote (apparaît après réponse) -->
      <div class="vinyl-exp" id="vinyl-exp" hidden></div>
    </div>

    <audio id="vinyl-audio" loop preload="auto"></audio>

    <div class="vinyl-actions" id="vinyl-actions">
      <button class="btn-action btn-wrong" id="btn-vinyl-wrong">
        <span class="action-icon">✗</span>
        <span>Je ne savais pas</span>
      </button>
      <button class="btn-action btn-correct" id="btn-vinyl-correct">
        <span class="action-icon">✓</span>
        <span>Je savais !</span>
      </button>
    </div>
  </div>

  <!-- ── RESULTS ────────────────────────────────────────────────────────── -->
  <div id="screen-results" class="screen">
    <div class="results-container">
      <div class="results-header">
        <div id="results-emoji" class="results-emoji">🎉</div>
        <h1 class="results-title">Résultat</h1>
        <div id="results-category" class="results-category"></div>
      </div>

      <div class="results-score-card">
        <div class="score-big">
          <span id="results-correct">0</span>
          <span class="score-sep">/</span>
          <span id="results-total">0</span>
        </div>
        <div id="results-percentage" class="results-percentage">0 %</div>
        <div id="results-message" class="results-message"></div>
      </div>

      <div class="results-actions">
        <button class="btn-primary" id="btn-replay">Rejouer cette catégorie</button>
        <button class="btn-ghost" id="btn-home">Changer de catégorie</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
